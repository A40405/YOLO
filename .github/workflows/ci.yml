name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Create WSL-style workspace path
        run: |
          sudo mkdir -p /mnt/e
          sudo ln -sfn "$GITHUB_WORKSPACE" /mnt/e/YOLO

      - name: Sync dependencies
        working-directory: /mnt/e/YOLO
        run: uv sync --python 3.11

      - name: Prepare YOLO test assets
        working-directory: /mnt/e/YOLO
        run: uv run --python 3.11 python src/scripts/check_yolo.py

      - name: Run tests with coverage
        working-directory: /mnt/e/YOLO
        run: uv run --python 3.11 python -m pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: /mnt/e/YOLO/coverage.xml
