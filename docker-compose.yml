services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: yolo-platform-api:latest
    container_name: yolo-platform-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      API_HOST: "${API_HOST:-0.0.0.0}"
      API_PORT: "${API_PORT:-8000}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: yolo-platform-api:latest
    container_name: yolo-platform-api-gpu
    profiles: ["gpu"]
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      API_HOST: "${API_HOST:-0.0.0.0}"
      API_PORT: "${API_PORT:-8000}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    gpus: all
    restart: unless-stopped
